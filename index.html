<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>türkçe</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <section id="view-decks" hidden>
      <div id="deck-lists"></div>
    </section>

    <section id="view-review" hidden>
      <div id="review-header">
        <div id="review-progress"></div>
        <button id="btn-exit-session" aria-label="end session" hidden>×</button>
      </div>
      <div id="card" lang="tr">
        <div id="card-front"></div>
        <div id="card-back" hidden>
          <div id="card-answer"></div>
          <div id="card-explanation" lang="en"></div>
          <div id="card-history" lang="en" hidden></div>
        </div>
      </div>
      <div id="flip-hint">tap card to flip</div>
      <div id="grade-row" hidden>
        <button class="grade" data-grade="0">0<span>fail</span></button>
        <button class="grade" data-grade="1">1<span>hard</span></button>
        <button class="grade" data-grade="2">2<span>good</span></button>
        <button class="grade" data-grade="3">3<span>easy</span></button>
      </div>
      <div id="session-done" hidden>
        <p id="session-summary"></p>
        <p id="session-sync-status"></p>
        <button id="btn-back-to-decks">back to decks</button>
      </div>
    </section>

    <section id="view-builder" hidden>
      <div id="builder-home">
        <h1>sentence builder</h1>
        <div class="deck-group" id="builder-lists"></div>
      </div>
      <div id="builder-play" hidden>
        <div id="builder-header">
          <div id="builder-progress"></div>
          <button id="btn-exit-builder" aria-label="end session">×</button>
        </div>
        <div id="builder-prompt" lang="en"></div>
        <div id="builder-sentence" lang="tr"></div>
        <div id="builder-bank" lang="tr"></div>
        <div id="builder-actions">
          <button id="btn-sb-submit">check</button>
          <button id="btn-sb-reveal">reveal</button>
        </div>
        <p id="builder-feedback" lang="tr"></p>
        <div id="builder-result" hidden>
          <div id="sb-grade"></div>
          <div id="sb-answer" lang="tr"></div>
          <div id="sb-explanation" lang="en"></div>
          <button id="btn-sb-next">next</button>
        </div>
        <div id="builder-done" hidden>
          <p id="builder-summary"></p>
          <button id="btn-sb-back">back</button>
        </div>
      </div>
      <div id="builder-sheet" hidden>
        <div id="sheet-backdrop"></div>
        <div id="sheet-panel">
          <div id="sheet-delay" hidden>think first — how would you say it?</div>
          <div id="sheet-wheels">
            <ul id="sheet-wheel1" lang="tr"></ul>
            <ul id="sheet-wheel2" lang="tr"></ul>
          </div>
          <div id="sheet-info" hidden></div>
          <div id="sheet-buttons">
            <button id="btn-sheet-cancel">cancel</button>
            <button id="btn-sheet-confirm" disabled>add</button>
          </div>
        </div>
      </div>
    </section>

    <section id="view-settings" hidden>
      <h1>settings</h1>
      <label>GitHub username
        <input id="set-owner" autocapitalize="none" autocorrect="off" placeholder="matzeyp">
      </label>
      <label>Data repo name
        <input id="set-repo" autocapitalize="none" autocorrect="off" placeholder="turkce">
      </label>
      <label>Fine-grained PAT <small>(contents read/write on the data repo; stored only in this browser's localStorage)</small>
        <input id="set-pat" type="password" autocapitalize="none" autocorrect="off">
      </label>
      <fieldset id="set-direction">
        <legend>vocab direction <small>(mixed = each word once per session, random direction; breakdown/grammar cards are unaffected)</small></legend>
        <label class="radio"><input type="radio" name="direction" value="mixed" checked> mixed</label>
        <label class="radio"><input type="radio" name="direction" value="tr-en"> Turkish → English</label>
        <label class="radio"><input type="radio" name="direction" value="en-tr"> English → Turkish</label>
      </fieldset>
      <label class="radio"><input type="checkbox" id="set-builder-delay" checked>
        builder: hide the suffix wheels for a beat <small>(forces a recall attempt before the options appear)</small></label>
      <button id="btn-save-settings">save</button>
      <hr>
      <button id="btn-sync">sync now</button>
      <p id="sync-status"></p>
    </section>
  </main>

  <nav>
    <button data-view="decks">decks</button>
    <button data-view="review">review</button>
    <button data-view="builder">builder</button>
    <button data-view="settings">settings</button>
  </nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
